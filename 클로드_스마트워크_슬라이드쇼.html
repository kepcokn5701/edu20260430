<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>클로드와 함께하는 스마트 워크 - 뉴스 브리핑 편</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: #0a0a14;
  color: #fff;
  overflow: hidden;
  height: 100vh;
  user-select: none;
}

#root { height: 100vh; }

/* 슬라이드 컨테이너 */
.slide-container {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* 슬라이드 */
.slide {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px 80px;
  position: relative;
  animation: fadeSlideIn 0.6s ease;
}

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 배경 오브 */
.bg-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
  z-index: 0;
}

.bg-orb-1 {
  width: 500px; height: 500px;
  background: rgba(124, 58, 237, 0.15);
  top: -15%; right: -5%;
}
.bg-orb-2 {
  width: 400px; height: 400px;
  background: rgba(0, 210, 255, 0.1);
  bottom: -15%; left: -5%;
}

/* 슬라이드 번호 태그 */
.slide-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 20px;
  width: fit-content;
  z-index: 1;
}

/* 제목 */
.slide-title {
  font-size: 48px;
  font-weight: 900;
  line-height: 1.3;
  margin-bottom: 10px;
  z-index: 1;
}

.slide-subtitle {
  font-size: 20px;
  color: #8892b0;
  margin-bottom: 40px;
  z-index: 1;
  font-weight: 400;
}

/* 콘텐츠 */
.slide-content {
  display: flex;
  gap: 24px;
  z-index: 1;
  flex-wrap: wrap;
}

/* 카드 */
.content-card {
  flex: 1;
  min-width: 250px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 28px;
  backdrop-filter: blur(10px);
  transition: all 0.4s ease;
  animation: cardPop 0.5s ease backwards;
}

.content-card:nth-child(1) { animation-delay: 0.15s; }
.content-card:nth-child(2) { animation-delay: 0.3s; }
.content-card:nth-child(3) { animation-delay: 0.45s; }
.content-card:nth-child(4) { animation-delay: 0.6s; }

@keyframes cardPop {
  from { opacity: 0; transform: translateY(20px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.content-card:hover {
  background: rgba(255,255,255,0.07);
  transform: translateY(-4px);
  border-color: rgba(255,255,255,0.15);
}

.card-icon {
  font-size: 36px;
  margin-bottom: 14px;
  display: block;
}

.card-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 10px;
  line-height: 1.4;
}

.card-desc {
  font-size: 15px;
  color: #8892b0;
  line-height: 1.7;
}

.card-highlight {
  color: #00d2ff;
  font-weight: 600;
}

/* 비교 레이아웃 (Slide 2) */
.compare-wrap {
  display: flex;
  gap: 24px;
  z-index: 1;
  width: 100%;
}

.compare-card {
  flex: 1;
  border-radius: 20px;
  padding: 30px;
  animation: cardPop 0.5s ease backwards;
}

.compare-card.old {
  background: rgba(255, 107, 107, 0.08);
  border: 1px solid rgba(255, 107, 107, 0.2);
  animation-delay: 0.15s;
}

.compare-card.new {
  background: rgba(0, 230, 150, 0.08);
  border: 1px solid rgba(0, 230, 150, 0.2);
  animation-delay: 0.3s;
}

.compare-card.tip {
  background: rgba(124, 58, 237, 0.1);
  border: 1px solid rgba(124, 58, 237, 0.2);
  animation-delay: 0.45s;
}

.compare-label {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.compare-steps {
  list-style: none;
}

.compare-steps li {
  padding: 8px 0;
  font-size: 16px;
  color: #ccc;
  display: flex;
  align-items: center;
  gap: 10px;
  line-height: 1.5;
}

.compare-steps li .arrow { color: #8892b0; font-size: 14px; }

/* 스텝 레이아웃 (Slide 3) */
.steps-wrap {
  display: flex;
  gap: 20px;
  align-items: stretch;
  z-index: 1;
  width: 100%;
}

.step-card {
  flex: 1;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 24px;
  text-align: center;
  position: relative;
  animation: cardPop 0.5s ease backwards;
}

.step-card:nth-child(1) { animation-delay: 0.1s; }
.step-card:nth-child(2) { animation-delay: 0.25s; }
.step-card:nth-child(3) { animation-delay: 0.4s; }

.step-num {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 800;
  margin: 0 auto 14px;
  color: #fff;
}

.step-arrow {
  position: absolute;
  right: -22px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 24px;
  color: #8892b0;
  z-index: 2;
}

/* 팁 카드 (Slide 4) */
.tip-card {
  flex: 1;
  min-width: 280px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 28px;
  animation: cardPop 0.5s ease backwards;
  transition: all 0.3s;
}
.tip-card:hover {
  transform: translateY(-4px);
  background: rgba(255,255,255,0.07);
}

.tip-card:nth-child(1) { animation-delay: 0.1s; border-top: 3px solid #00d2ff; }
.tip-card:nth-child(2) { animation-delay: 0.25s; border-top: 3px solid #7c3aed; }
.tip-card:nth-child(3) { animation-delay: 0.4s; border-top: 3px solid #00e696; }

/* Slide 5 엔딩 */
.ending-wrap {
  z-index: 1;
  width: 100%;
}

.ending-cards {
  display: flex;
  gap: 24px;
  margin-bottom: 30px;
}

.ending-card {
  flex: 1;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 28px;
  animation: cardPop 0.5s ease backwards;
  transition: all 0.3s;
}
.ending-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.07); }
.ending-card:nth-child(1) { animation-delay: 0.1s; }
.ending-card:nth-child(2) { animation-delay: 0.25s; }

.ending-banner {
  background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(0,210,255,0.15));
  border: 1px solid rgba(124,58,237,0.3);
  border-radius: 20px;
  padding: 30px 40px;
  text-align: center;
  animation: cardPop 0.6s ease 0.4s backwards;
}

.ending-banner .big-text {
  font-size: 26px;
  font-weight: 800;
  margin-bottom: 6px;
}

.ending-banner .sub-text {
  font-size: 16px;
  color: #8892b0;
}

/* 네비게이션 바 */
.nav-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 40px;
  background: rgba(15,15,26,0.9);
  border-top: 1px solid rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  z-index: 10;
}

.nav-progress {
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-dot {
  width: 32px;
  height: 5px;
  border-radius: 3px;
  background: rgba(255,255,255,0.1);
  cursor: pointer;
  transition: all 0.3s;
}

.nav-dot.active {
  background: linear-gradient(90deg, #00d2ff, #7c3aed);
  width: 48px;
}

.nav-dot:hover:not(.active) {
  background: rgba(255,255,255,0.25);
}

.nav-buttons {
  display: flex;
  gap: 10px;
}

.nav-btn {
  padding: 10px 24px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.3s;
}

.nav-btn:hover {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.2);
}

.nav-btn.primary {
  background: linear-gradient(135deg, #7c3aed, #00d2ff);
  border: none;
}
.nav-btn.primary:hover { opacity: 0.9; transform: scale(1.03); }

.nav-info {
  font-size: 14px;
  color: #8892b0;
}

.nav-info span { color: #fff; font-weight: 700; }

/* 키보드 힌트 */
.key-hint {
  position: fixed;
  bottom: 80px;
  right: 30px;
  font-size: 12px;
  color: rgba(255,255,255,0.2);
  z-index: 10;
}
.key-hint kbd {
  padding: 2px 8px;
  background: rgba(255,255,255,0.08);
  border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.1);
  font-family: inherit;
}

/* 메시지 박스 */
.msg-box {
  margin-top: 20px;
  padding: 16px 24px;
  background: linear-gradient(135deg, rgba(0,210,255,0.1), rgba(124,58,237,0.1));
  border: 1px solid rgba(0,210,255,0.2);
  border-radius: 14px;
  font-size: 16px;
  color: #00d2ff;
  font-weight: 600;
  z-index: 1;
  animation: cardPop 0.5s ease 0.6s backwards;
}

/* 경고 박스 */
.warn-box {
  margin-top: 10px;
  padding: 12px 20px;
  background: rgba(255,159,67,0.1);
  border: 1px solid rgba(255,159,67,0.2);
  border-radius: 12px;
  font-size: 14px;
  color: #ff9f43;
  z-index: 1;
  animation: cardPop 0.5s ease 0.5s backwards;
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const slides = [
  // Slide 1
  {
    tag: "INTRO",
    tagColor: "#7c3aed",
    title: "왜 다들 '클로드, 클로드' 할까요?",
    subtitle: "단순한 챗봇을 넘어선 '눈치 빠른 파트너'",
    type: "cards",
    cards: [
      { icon: "📖", title: "긴 글 읽기 대장", desc: "수십 페이지 보고서, 수천 개 뉴스 댓글도", highlight: "3초 만에 핵심 요약" },
      { icon: "✍️", title: "사람 같은 문장력", desc: "부장님께 드릴 보고서부터 MZ용 카피까지", highlight: "맞춤형 말투 가능" },
      { icon: "🎨", title: "비주얼 비서", desc: "말만 하면 웹사이트나 도표를 바로 그려주는", highlight: "Artifacts 기능 탑재" },
    ]
  },
  // Slide 2
  {
    tag: "WORKFLOW",
    tagColor: "#00d2ff",
    title: "업무 시작 20분 단축! '나만의 뉴스 센터'",
    subtitle: "검색의 시대는 가고, 요약의 시대가 왔습니다",
    type: "compare",
  },
  // Slide 3
  {
    tag: "DEMO",
    tagColor: "#00e696",
    title: "[시연] 코딩 몰라도 만드는 '뉴스 전광판'",
    subtitle: "Artifacts(아티팩트) 기능 제대로 보기",
    type: "steps",
  },
  // Slide 4
  {
    tag: "SKILL UP",
    tagColor: "#ff6b6b",
    title: "스마트한 비서 활용법: '단계별 대화'",
    subtitle: "한 번에 안 나와도 당황하지 마세요!",
    type: "tips",
  },
  // Slide 5
  {
    tag: "FINALE",
    tagColor: "#ffd600",
    title: "언제 어디서나 클로드와 동행하기",
    subtitle: "PC와 모바일의 환상적인 팀워크",
    type: "ending",
  },
];

function SlideShow() {
  const [current, setCurrent] = useState(0);
  const [animKey, setAnimKey] = useState(0);

  const goTo = useCallback((idx) => {
    if (idx >= 0 && idx < slides.length) {
      setCurrent(idx);
      setAnimKey(k => k + 1);
    }
  }, []);

  const next = useCallback(() => goTo(current + 1), [current, goTo]);
  const prev = useCallback(() => goTo(current - 1), [current, goTo]);

  useEffect(() => {
    const handler = (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [next, prev]);

  const s = slides[current];

  return (
    <div className="slide-container">
      <div className="slide" key={animKey}>
        <div className="bg-orb bg-orb-1" />
        <div className="bg-orb bg-orb-2" />

        <div className="slide-tag" style={{ background: s.tagColor + '22', color: s.tagColor, border: `1px solid ${s.tagColor}44` }}>
          <span>SLIDE {String(current + 1).padStart(2, '0')}</span>
          <span>—</span>
          <span>{s.tag}</span>
        </div>

        <h1 className="slide-title">{s.title}</h1>
        <p className="slide-subtitle">{s.subtitle}</p>

        {s.type === 'cards' && (
          <div className="slide-content">
            {s.cards.map((c, i) => (
              <div className="content-card" key={i}>
                <span className="card-icon">{c.icon}</span>
                <div className="card-title">{c.title}</div>
                <div className="card-desc">{c.desc} <span className="card-highlight">{c.highlight}</span></div>
              </div>
            ))}
          </div>
        )}

        {s.type === 'compare' && (
          <>
            <div className="compare-wrap">
              <div className="compare-card old">
                <div className="compare-label" style={{ color: '#ff6b6b' }}>
                  <i className="ri-close-circle-fill" /> 기존 방식
                </div>
                <ul className="compare-steps">
                  <li><span className="arrow">→</span> 경제 뉴스 검색</li>
                  <li><span className="arrow">→</span> 제목 클릭</li>
                  <li><span className="arrow">→</span> 광고 닫기</li>
                  <li><span className="arrow">→</span> 읽기</li>
                  <li><span className="arrow">→</span> 다시 반복... 😩</li>
                </ul>
              </div>
              <div className="compare-card new">
                <div className="compare-label" style={{ color: '#00e696' }}>
                  <i className="ri-check-double-fill" /> Claude 방식
                </div>
                <ul className="compare-steps">
                  <li style={{ fontSize: '18px', color: '#fff', fontWeight: 600 }}>
                    "오늘 IT랑 주식 뉴스 핵심만 뽑아서 표로 정리해 줘."
                  </li>
                  <li style={{ marginTop: '8px', color: '#00e696' }}>✅ 끝! 한 문장이면 충분합니다</li>
                </ul>
              </div>
              <div className="compare-card tip">
                <div className="compare-label" style={{ color: '#7c3aed' }}>
                  <i className="ri-rocket-2-fill" /> 확장성
                </div>
                <ul className="compare-steps">
                  <li>📊 업계 트렌드 분석</li>
                  <li>🔍 경쟁사 동향 파악</li>
                  <li>📰 맞춤형 뉴스레터</li>
                  <li>📋 회의 브리핑 자료</li>
                </ul>
              </div>
            </div>
            <div className="msg-box">
              💡 정보를 '찾는' 수고를 Claude에게 맡기고, 우리는 <strong>'판단'</strong>만 하세요.
            </div>
          </>
        )}

        {s.type === 'steps' && (
          <>
            <div className="steps-wrap">
              <div className="step-card">
                <div className="step-num" style={{ background: '#00d2ff' }}>1</div>
                <div className="card-title">카테고리 말하기</div>
                <div className="card-desc">내가 원하는 뉴스 카테고리를<br/>자연어로 말하기</div>
                <div className="step-arrow">→</div>
              </div>
              <div className="step-card">
                <div className="step-num" style={{ background: '#7c3aed' }}>2</div>
                <div className="card-title">대시보드 자동 생성</div>
                <div className="card-desc">Claude가 실시간으로<br/>웹 대시보드를 제작</div>
                <div className="step-arrow">→</div>
              </div>
              <div className="step-card">
                <div className="step-num" style={{ background: '#00e696' }}>3</div>
                <div className="card-title">말로 수정하기</div>
                <div className="card-desc">"색깔 바꿔줘", "항목 추가해줘"<br/>말 한마디로 즉시 수정</div>
              </div>
            </div>
            <div className="msg-box">
              🎯 "이제 결과물을 상상만 하지 마세요. Claude가 실시간으로 그려드립니다."
            </div>
            <div style={{ marginTop: '12px', padding: '12px 20px', background: 'rgba(255,255,255,0.03)', borderRadius: '12px', fontSize: '14px', color: '#8892b0', zIndex: 1, animation: 'cardPop 0.5s ease 0.7s backwards' }}>
              <strong style={{ color: '#00d2ff' }}>Artifacts란?</strong> — Claude가 작성한 코드나 디자인을 오른쪽 화면에 즉시 실행해서 보여주는 기능
            </div>
          </>
        )}

        {s.type === 'tips' && (
          <div className="slide-content">
            <div className="tip-card">
              <span className="card-icon">🧠</span>
              <div className="card-title">더 똑똑하게 시키는 팁</div>
              <div className="card-desc">
                <span className="card-highlight">"단계별로 생각해서 작성해 줘"</span>라고 말하면 정확도가 <strong style={{ color: '#fff' }}>2배!</strong>
              </div>
            </div>
            <div className="tip-card">
              <span className="card-icon">🔄</span>
              <div className="card-title">피드백의 힘</div>
              <div className="card-desc">
                결과가 마음에 안 들면 새로 시작하지 말고,<br/>
                <span className="card-highlight">"이 부분만 좀 더 부드럽게 고쳐줘"</span>라고 대화를 이어가세요
              </div>
            </div>
            <div className="tip-card">
              <span className="card-icon">📎</span>
              <div className="card-title">자료 첨부</div>
              <div className="card-desc">
                엑셀이나 PDF 파일을 던져주고<br/>
                <span className="card-highlight">"이 내용 바탕으로 뉴스레터 만들어줘"</span>라고 시켜보세요
              </div>
            </div>
          </div>
        )}

        {s.type === 'ending' && (
          <div className="ending-wrap">
            <div className="ending-cards">
              <div className="ending-card">
                <span className="card-icon">📱</span>
                <div className="card-title">출근길엔 모바일로</div>
                <div className="card-desc">
                  지하철에서 프롬프트 작성<br/>
                  <span className="card-highlight">"오늘 회의 자료 미리 읽어놔줘"</span>
                </div>
              </div>
              <div className="ending-card">
                <span className="card-icon">💻</span>
                <div className="card-title">사무실엔 PC로</div>
                <div className="card-desc">
                  도착해서 PC를 켜면<br/>
                  <span className="card-highlight">Claude가 이미 작업을 끝내놓고 대기 중</span>
                </div>
              </div>
            </div>
            <div className="warn-box">
              ⚠️ 주의: PC 로컬 기능을 쓸 땐 집/회사 PC가 켜져 있어야 합니다
            </div>
            <div className="ending-banner">
              <div className="big-text">Claude는 도구입니다.</div>
              <div className="sub-text">이 도구를 잘 다루는 사람이 미래의 에이스입니다.</div>
            </div>
          </div>
        )}
      </div>

      {/* 네비게이션 */}
      <div className="nav-bar">
        <div className="nav-info">
          <span>{current + 1}</span> / {slides.length}
        </div>
        <div className="nav-progress">
          {slides.map((_, i) => (
            <div key={i} className={`nav-dot ${i === current ? 'active' : ''}`} onClick={() => goTo(i)} />
          ))}
        </div>
        <div className="nav-buttons">
          <button className="nav-btn" onClick={prev} disabled={current === 0}>
            <i className="ri-arrow-left-s-line" /> 이전
          </button>
          <button className={`nav-btn ${current < slides.length - 1 ? 'primary' : ''}`} onClick={next} disabled={current === slides.length - 1}>
            다음 <i className="ri-arrow-right-s-line" />
          </button>
        </div>
      </div>

      <div className="key-hint">
        <kbd>←</kbd> <kbd>→</kbd> 또는 <kbd>Space</kbd> 로 이동
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<SlideShow />);
</script>
</body>
</html>
