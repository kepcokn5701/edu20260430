<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실시간 뉴스 전광판</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

/* 다크 모드 (기본) */
:root {
  --bg-primary: #0a1628;
  --bg-secondary: #0f1f3d;
  --bg-card: rgba(255,255,255,0.04);
  --bg-card-hover: rgba(255,255,255,0.07);
  --bg-input: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.15);
  --text-primary: #ffffff;
  --text-secondary: #d8dde8;
  --text-dim: #8892a8;
  --text-muted: #6b7280;
  --badge-bg: rgba(255,255,255,0.06);
  --blue: #3b82f6;
  --cyan: #06b6d4;
  --green: #10b981;
  --amber: #f59e0b;
  --rose: #f43f5e;
  --purple: #8b5cf6;
  --radius: 16px;
}


body {
  font-family: 'Noto Sans KR', sans-serif;
  background: linear-gradient(180deg, var(--bg-primary), var(--bg-secondary));
  color: var(--text-primary);
  min-height: 100vh;
  transition: background 0.4s, color 0.4s;
}

/* ── 헤더 ── */
.header {
  padding: 32px 40px 0;
  max-width: 1440px;
  margin: 0 auto;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  flex-wrap: wrap;
  gap: 16px;
}

.header-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 14px;
  background: rgba(16,185,129,0.12);
  border: 1px solid rgba(16,185,129,0.3);
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  color: var(--green);
  margin-bottom: 10px;
}

.header-badge .dot {
  width: 7px; height: 7px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.header h1 { font-size: 32px; font-weight: 900; }
.header-date { font-size: 14px; color: var(--text-dim); margin-top: 4px; }

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-clock {
  font-size: 26px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--cyan);
}

.header-weather {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 14px;
  color: var(--text-secondary);
}


.refresh-btn {
  padding: 8px 16px;
  background: rgba(59,130,246,0.15);
  border: 1px solid rgba(59,130,246,0.3);
  border-radius: 10px;
  color: var(--blue);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.3s;
}
.refresh-btn:hover { background: var(--blue); color: #fff; }
.refresh-btn.loading i { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 통계 바 ── */
.stats-bar {
  display: flex;
  gap: 14px;
  padding: 20px 40px;
  max-width: 1440px;
  margin: 0 auto;
  flex-wrap: wrap;
}

.stat-chip {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  flex: 1;
  min-width: 200px;
  transition: all 0.3s;
}
.stat-chip:hover { background: var(--bg-card-hover); transform: translateY(-2px); }

.stat-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.stat-label { font-size: 11px; color: var(--text-dim); margin-bottom: 2px; }
.stat-value { font-size: 17px; font-weight: 700; font-variant-numeric: tabular-nums; }
.stat-change {
  font-size: 12px; font-weight: 600;
  margin-left: auto;
  padding: 3px 8px;
  border-radius: 6px;
}
.stat-change.up { color: var(--green); background: rgba(16,185,129,0.12); }
.stat-change.down { color: var(--rose); background: rgba(244,63,94,0.12); }
.stat-change.flat { color: var(--text-dim); background: var(--bg-input); }

.stat-loading {
  color: var(--text-muted);
  font-size: 13px;
}

/* ── 메인 그리드 ── */
.main {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px;
  padding: 0 40px 40px;
  max-width: 1440px;
  margin: 0 auto;
}

/* ── 섹션 ── */
.section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: all 0.3s;
}

.section-header {
  padding: 18px 22px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
}

.section-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

.section-title { font-size: 17px; font-weight: 800; }

.section-count {
  margin-left: auto;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 600;
}

.section-status {
  margin-left: auto;
  font-size: 11px;
  color: var(--text-muted);
}

/* ── 뉴스 카드 ── */
.news-list { padding: 10px; }

.news-card {
  padding: 16px;
  border-radius: 14px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  border: 1px solid transparent;
}

.news-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-hover);
  transform: scale(1.03);
}

.news-card:last-child { margin-bottom: 0; }

.news-tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 5px;
  margin-bottom: 8px;
}

.news-headline {
  font-size: 15px;
  font-weight: 700;
  line-height: 1.5;
  margin-bottom: 8px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.news-summary {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.6;
  margin-bottom: 12px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.news-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.news-meta {
  font-size: 11px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 4px;
}

.news-btn {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-input);
  color: var(--text-primary);
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all 0.3s;
}

.news-btn:hover { background: var(--blue); border-color: var(--blue); }

/* 로딩 스켈레톤 */
.skeleton {
  padding: 16px;
  margin-bottom: 6px;
}

.skeleton-line {
  height: 14px;
  background: var(--bg-input);
  border-radius: 6px;
  margin-bottom: 10px;
  animation: shimmer 1.5s infinite;
}

.skeleton-line:nth-child(1) { width: 30%; height: 10px; }
.skeleton-line:nth-child(2) { width: 90%; }
.skeleton-line:nth-child(3) { width: 70%; }
.skeleton-line:nth-child(4) { width: 50%; height: 10px; }

@keyframes shimmer {
  0% { opacity: 0.4; }
  50% { opacity: 0.8; }
  100% { opacity: 0.4; }
}

/* 에러 메시지 */
.error-msg {
  padding: 20px;
  text-align: center;
  color: var(--text-muted);
  font-size: 14px;
}

.error-msg i { font-size: 28px; display: block; margin-bottom: 8px; color: var(--amber); }

/* ── 업데이트 시각 ── */
.footer {
  text-align: center;
  padding: 20px 40px;
  max-width: 1440px;
  margin: 0 auto;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  justify-content: center;
  gap: 20px;
}

/* ── 반응형 ── */
@media (max-width: 1100px) {
  .main { grid-template-columns: 1fr; }
  .stats-bar { gap: 10px; }
}

@media (max-width: 768px) {
  .header, .stats-bar, .main { padding-left: 16px; padding-right: 16px; }
  .header h1 { font-size: 24px; }
  .header-top { flex-direction: column; }
  .stat-chip { min-width: 100%; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div>
      <div class="header-badge"><span class="dot"></span> 실시간 데이터 연동</div>
      <h1>📰 오늘의 핵심 브리핑</h1>
      <div class="header-date" id="headerDate"></div>
    </div>
    <div class="header-right">
      <div class="header-weather" id="weather">☀️ 로딩중...</div>
      <div class="header-clock" id="clock">--:--</div>
      <button class="refresh-btn" id="refreshBtn" onclick="refreshAll()">
        <i class="ri-refresh-line"></i> 새로고침
      </button>
    </div>
  </div>
</header>

<!-- 실시간 시세 -->
<div class="stats-bar" id="statsBar">
  <div class="stat-chip">
    <div class="stat-icon" style="background:rgba(59,130,246,0.15); color:var(--blue);"><i class="ri-funds-line"></i></div>
    <div><div class="stat-label">코스피 (KOSPI)</div><div class="stat-value" id="kospiPrice"><span class="stat-loading">로딩중...</span></div></div>
    <div class="stat-change flat" id="kospiChange">-</div>
  </div>
  <div class="stat-chip">
    <div class="stat-icon" style="background:rgba(16,185,129,0.15); color:var(--green);"><i class="ri-exchange-dollar-line"></i></div>
    <div><div class="stat-label">환율 (USD/KRW)</div><div class="stat-value" id="usdKrw"><span class="stat-loading">로딩중...</span></div></div>
    <div class="stat-change flat" id="usdChange">-</div>
  </div>
  <div class="stat-chip">
    <div class="stat-icon" style="background:rgba(245,158,11,0.15); color:var(--amber);"><i class="ri-bitcoin-line"></i></div>
    <div><div class="stat-label">비트코인 (BTC)</div><div class="stat-value" id="btcPrice"><span class="stat-loading">로딩중...</span></div></div>
    <div class="stat-change flat" id="btcChange">-</div>
  </div>
  <div class="stat-chip">
    <div class="stat-icon" style="background:rgba(139,92,246,0.15); color:var(--purple);"><i class="ri-gas-station-line"></i></div>
    <div><div class="stat-label">전국 휘발유 (원/리터)</div><div class="stat-value" id="gasPrice"><span class="stat-loading">로딩중...</span></div></div>
    <div class="stat-change flat" id="gasChange">-</div>
  </div>
</div>

<!-- 뉴스 그리드 -->
<main class="main">
  <div class="section" id="sectionEcon">
    <div class="section-header">
      <div class="section-icon" style="background:rgba(59,130,246,0.15); color:var(--blue);"><i class="ri-bar-chart-box-line"></i></div>
      <div class="section-title">경제 / 금융</div>
      <div class="section-status" id="econStatus">로딩중...</div>
    </div>
    <div class="news-list" id="econNews"><div class="skeleton"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div><div class="skeleton"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div><div class="skeleton"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
  </div>

  <div class="section" id="sectionTech">
    <div class="section-header">
      <div class="section-icon" style="background:rgba(139,92,246,0.15); color:var(--purple);"><i class="ri-cpu-line"></i></div>
      <div class="section-title">IT(AI) / 전력산업</div>
      <div class="section-status" id="techStatus">로딩중...</div>
    </div>
    <div class="news-list" id="techNews"><div class="skeleton"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div><div class="skeleton"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div><div class="skeleton"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
  </div>

  <div class="section" id="sectionWorld">
    <div class="section-header">
      <div class="section-icon" style="background:rgba(16,185,129,0.15); color:var(--green);"><i class="ri-globe-line"></i></div>
      <div class="section-title">세계 / 국제</div>
      <div class="section-status" id="worldStatus">로딩중...</div>
    </div>
    <div class="news-list" id="worldNews"><div class="skeleton"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div><div class="skeleton"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div><div class="skeleton"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div></div>
  </div>
</main>

<div class="footer">
  <span>📡 데이터 출처: Google News RSS, CoinGecko API, open.er-api.com, wttr.in, allorigins.win</span>
  <span>|</span>
  <span id="lastUpdate">마지막 업데이트: --:--</span>
</div>

<script>

// ── 시계 & 날짜 ──
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}:${s}`;

  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('headerDate').textContent =
    `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]}) | 실시간 뉴스 대시보드`;
}
setInterval(updateClock, 1000);
updateClock();

// ── 날씨 (wttr.in, 키 불필요) ──
async function loadWeather() {
  try {
    const res = await fetch('https://wttr.in/Seoul?format=%t|%C&lang=ko');
    const data = await res.text();
    const [temp, desc] = data.split('|');
    let icon = '☀️';
    if (desc.includes('비')||desc.includes('rain')||desc.includes('Rain')) icon = '🌧️';
    else if (desc.includes('구름')||desc.includes('cloud')||desc.includes('Cloud')||desc.includes('Overcast')) icon = '☁️';
    else if (desc.includes('눈')||desc.includes('snow')) icon = '❄️';
    else if (desc.includes('맑')||desc.includes('Clear')||desc.includes('Sunny')) icon = '☀️';
    else if (desc.includes('안개')||desc.includes('fog')||desc.includes('Mist')) icon = '🌫️';
    document.getElementById('weather').innerHTML = `${icon} 서울 ${temp.trim()} ${desc.trim()}`;
  } catch {
    document.getElementById('weather').textContent = '☀️ 날씨 정보 없음';
  }
}

// ── 타임아웃 fetch ──
function fetchWithTimeout(url, ms = 8000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), ms);
  return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(timer));
}

// ── Google News RSS 파싱 (XML → 배열) ──
function parseRssXml(xmlText) {
  const parser = new DOMParser();
  const xml = parser.parseFromString(xmlText, 'text/xml');
  return Array.from(xml.querySelectorAll('item')).map(item => ({
    title: item.querySelector('title')?.textContent || '',
    link: item.querySelector('link')?.textContent || '',
    pubDate: item.querySelector('pubDate')?.textContent || '',
    description: item.querySelector('description')?.textContent || '',
  }));
}

// ── Google News RSS 가져오기 (allorigins → rss2json 폴백) ──
async function fetchGoogleRSS(query) {
  const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=ko&gl=KR&ceid=KR:ko`;

  // 1차: allorigins 프록시
  try {
    const res = await fetchWithTimeout(`https://api.allorigins.win/raw?url=${encodeURIComponent(rssUrl)}`);
    const text = await res.text();
    const items = parseRssXml(text);
    if (items.length > 0) return items;
  } catch (e) { console.log('allorigins 실패, rss2json 시도:', e.message); }

  // 2차: rss2json 폴백
  const res = await fetchWithTimeout(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`);
  const data = await res.json();
  if (data.status === 'ok' && data.items?.length > 0) return data.items;

  throw new Error('RSS 로드 실패');
}

// ── 코스피 (뉴스 기반) ──
async function loadKospi() {
  try {
    const items = await fetchGoogleRSS('코스피 지수 포인트');
    const titles = items.slice(0, 10).map(i => i.title + ' ' + i.description).join(' ');
    const match = titles.match(/(2[,.]?\d{3}(?:\.\d{1,2})?)\s*(?:포인트|선|p|으로|에서|대)/i)
               || titles.match(/코스피\s*(?:지수\s*)?(\d[,.]?\d{3}(?:\.\d{1,2})?)/)
               || titles.match(/(2[,.]?\d{3}\.\d{1,2})/);
    if (match) {
      const price = match[1].replace(',', '');
      document.getElementById('kospiPrice').textContent = Number(price).toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 2});
    } else {
      document.getElementById('kospiPrice').textContent = '뉴스 참조';
    }
    document.getElementById('kospiChange').textContent = '뉴스 기반';
    document.getElementById('kospiChange').className = 'stat-change flat';
  } catch {
    document.getElementById('kospiPrice').textContent = '-';
    document.getElementById('kospiChange').textContent = '-';
  }
}

// ── 비트코인 시세 (CoinGecko, 키 불필요) ──
async function loadCrypto() {
  try {
    const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd,krw&include_24hr_change=true');
    const data = await res.json();

    const btcUsd = data.bitcoin.usd.toLocaleString();
    const btcChange = data.bitcoin.usd_24h_change.toFixed(1);
    document.getElementById('btcPrice').textContent = `$${btcUsd}`;
    const btcEl = document.getElementById('btcChange');
    btcEl.textContent = `${btcChange > 0 ? '▲' : '▼'} ${Math.abs(btcChange)}%`;
    btcEl.className = `stat-change ${btcChange >= 0 ? 'up' : 'down'}`;
  } catch {
    document.getElementById('btcPrice').textContent = '조회 실패';
  }
}

// ── 환율 (open.er-api.com, 키 불필요) ──
async function loadExchangeRate() {
  try {
    const res = await fetch('https://open.er-api.com/v6/latest/USD');
    const data = await res.json();
    const usdKrw = data.rates.KRW;

    document.getElementById('usdKrw').textContent = `₩${usdKrw.toFixed(2)}`;
    document.getElementById('usdChange').textContent = '실시간';
    document.getElementById('usdChange').className = 'stat-change flat';
  } catch {
    document.getElementById('usdKrw').textContent = '조회 실패';
  }
}

// ── 전국 평균 휘발유 가격 (뉴스 기반) ──
async function loadGasPrice() {
  try {
    const items = await fetchGoogleRSS('전국 평균 휘발유 가격 리터');
    const titles = items.slice(0, 10).map(i => i.title + ' ' + i.description).join(' ');
    const match = titles.match(/(1[,.]?\d{3}(?:\.\d{1,2})?)\s*원/);
    if (match) {
      const price = match[1].replace(',', '');
      document.getElementById('gasPrice').textContent = `₩${Number(price).toLocaleString()}`;
    } else {
      document.getElementById('gasPrice').textContent = '뉴스 참조';
    }
    document.getElementById('gasChange').textContent = '뉴스 기반';
    document.getElementById('gasChange').className = 'stat-change flat';
  } catch {
    document.getElementById('gasPrice').textContent = '-';
    document.getElementById('gasChange').textContent = '-';
  }
}

// ── 뉴스 RSS (Google News → allorigins 프록시) ──
const NEWS_CONFIGS = [
  {
    query: '경제 금융 증시',
    containerId: 'econNews',
    statusId: 'econStatus',
    tagColor: 'rgba(59,130,246,0.15)',
    tagTextColor: '#3b82f6',
    tagLabel: '경제',
  },
  {
    query: 'AI 인공지능 데이터센터 전력',
    containerId: 'techNews',
    statusId: 'techStatus',
    tagColor: 'rgba(139,92,246,0.15)',
    tagTextColor: '#8b5cf6',
    tagLabel: 'IT/AI',
  },
  {
    query: '세계 국제 뉴스 글로벌',
    containerId: 'worldNews',
    statusId: 'worldStatus',
    tagColor: 'rgba(16,185,129,0.15)',
    tagTextColor: '#10b981',
    tagLabel: '세계',
  },
];

function timeAgo(dateStr) {
  const now = new Date();
  const date = new Date(dateStr);
  const diff = Math.floor((now - date) / 60000);
  if (diff < 1) return '방금 전';
  if (diff < 60) return `${diff}분 전`;
  if (diff < 1440) return `${Math.floor(diff/60)}시간 전`;
  return `${Math.floor(diff/1440)}일 전`;
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function renderNewsCard(item, config) {
  const title = escapeHtml(item.title.replace(/ - .*$/, ''));
  const desc = item.description
    ? escapeHtml(item.description.replace(/<[^>]*>/g, '').substring(0, 100))
    : '';
  const time = timeAgo(item.pubDate);
  const link = item.link;

  return `
    <div class="news-card" onclick="window.open('${link}','_blank')">
      <div class="news-tag" style="background:${config.tagColor}; color:${config.tagTextColor};">${config.tagLabel}</div>
      <div class="news-headline">${title}</div>
      ${desc ? `<div class="news-summary">${desc}</div>` : ''}
      <div class="news-footer">
        <div class="news-meta"><i class="ri-time-line"></i> ${time}</div>
        <button class="news-btn" onclick="event.stopPropagation(); window.open('${link}','_blank');">
          <i class="ri-external-link-line"></i> 상세보기
        </button>
      </div>
    </div>
  `;
}

async function loadNews(config, configIndex) {
  const container = document.getElementById(config.containerId);
  const status = document.getElementById(config.statusId);

  try {
    const items = await fetchGoogleRSS(config.query);

    if (items.length > 0) {
      const sliced = items.slice(0, 5);
      container.innerHTML = sliced.map(item => renderNewsCard(item, config)).join('');
      status.innerHTML = `<span style="color:var(--green)">●</span> ${sliced.length}건 로드됨`;
    } else {
      throw new Error('No items');
    }
  } catch (e) {
    container.innerHTML = `
      <div class="error-msg">
        <i class="ri-wifi-off-line"></i>
        뉴스를 불러올 수 없습니다.<br>
        네트워크 연결을 확인하거나 잠시 후 다시 시도해주세요.
        <br><br>
        <button class="refresh-btn" onclick="loadNews(NEWS_CONFIGS[${configIndex ?? 0}], ${configIndex ?? 0})" style="margin:0 auto;">
          <i class="ri-refresh-line"></i> 다시 시도
        </button>
      </div>
    `;
    status.innerHTML = `<span style="color:var(--amber)">●</span> 로드 실패`;
  }
}

// ── 전체 새로고침 ──
async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  btn.disabled = true;

  await Promise.all([
    loadWeather(),
    loadKospi(),
    loadExchangeRate(),
    loadCrypto(),
    loadGasPrice(),
    ...NEWS_CONFIGS.map((c, i) => loadNews(c, i)),
  ]);

  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('lastUpdate').textContent = `마지막 업데이트: ${h}:${m}`;

  btn.classList.remove('loading');
  btn.disabled = false;
}

// ── 초기 로드 ──
refreshAll();

// 5분마다 자동 새로고침
setInterval(refreshAll, 5 * 60 * 1000);
</script>
